<!DOCTYPE html>
<html>
<head>
    <title>The Forest Guides</title>

    <style>
        body {
            background-color: #0b1a0b;
            color: #d9ffd9;
            font-family: "Courier New", monospace;
            text-align: center;
            padding: 100px;
        }

        h1 {
            font-size: 40px;
            text-shadow: 0 0 8px #66ff66;
        }

        p {
            font-size: 18px;
            max-width: 600px;
            margin: auto;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            background-color: #132e13;
            color: #b6ffb6;
            text-decoration: none;
            border: 2px solid #66ff66;
            transition: 0.3s;
        }

        a:hover {
            background-color: #1e4d1e;
            box-shadow: 0 0 12px #66ff66;
        }

        /* Hidden Ending */
        .secret {
            opacity: 0;
            transition: opacity 0.8s ease, text-shadow 0.8s ease;
            margin-top: 60px;
            cursor: pointer;
        }

        .secret:hover {
            opacity: 1;
            text-shadow: 0 0 15px #b6ffb6;
        }
    </style>
</head>

<body>

    <h1>The Forest Protects You</h1>

    <p>
        The animals guide you through the quiet trees.
        The disguised girl searches for you, but the forest hides your path.
        You listen. You trust.
        The trees begin to glow softly.
    </p>

    <h2 class="secret">YOU WAKE UP.</h2>

    <a href="index.html">Return to the Dream</a>

</body>
</html>
