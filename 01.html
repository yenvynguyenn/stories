<!DOCTYPE html>
<html>
<head>
<title>Forest Path</title>

<style>
body {
    background-color: #0b1a0b;
    color: #b6ffb6;
    font-family: "Courier New", monospace;
    text-align: center;
    padding-top: 100px;
}

/* Typewriter text */
.typewriter {
    width: 60%;
    margin: auto;
    margin-bottom: 30px;
    line-height: 1.6;
    border-right: 2px solid #b6ffb6;
    white-space: pre-wrap;
    overflow: hidden;
    animation: blink 1s infinite;
}

/* Blinking cursor */
@keyframes blink {
    0% { border-color: #b6ffb6; }
    50% { border-color: transparent; }
    100% { border-color: #b6ffb6; }
}

h1 {
    letter-spacing: 3px;
}

.choice {
    display: block;
    margin: 40px auto;
    width: 250px;
    padding: 12px;
    border: 2px solid #b6ffb6;
    background: #0b1a0b;
    color: #b6ffb6;
    font-family: "Courier New", monospace;
    cursor: pointer;
    transition: 0.2s;
}

.choice:hover {
    background: #b6ffb6;
    color: #0b1a0b;
}

/* Hidden ending */
.secret {
    opacity: 0;
    transition: opacity 0.8s ease;
    margin-top: 40px;
}

.secret:hover {
    opacity: 1;
}
</style>
</head>

<body>

<h1>FOREST PATH</h1>

<p class="typewriter" id="story"></p>

<h2 class="secret">YOU WAKE UP.</h2>

<a href="index.html">
    <button class="choice">Return to Dream</button>
</a>

<script>
const text = `The fox lowers its voice.
The owl watches the trees.
The deer signals you to hide.

The girl walks past.
Her shadow moves differently than she does.

You stay silent.
You survive.

You find a glowing doorway hidden between trees.
You step through it.`;

let i = 0;
const speed = 75; // typing speed
const story = document.getElementById("story");

function typeWriter() {
    if (i < text.length) {
        story.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
</script>

</body>
</html>
