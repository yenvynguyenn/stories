<!DOCTYPE html>
<html>
<head>
    <title>Dream Sequence</title>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: "Courier New", monospace;
            text-align: center;
            padding-top: 120px;
        }

        h1 {
            font-size: 40px;
            letter-spacing: 3px;
        }

        p {
            width: 60%;
            margin: auto;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .choice {
            display: block;
            margin: 20px auto;
            width: 250px;
            padding: 12px;
            border: 2px solid white;
            background: black;
            color: white;
            font-family: "Courier New", monospace;
            cursor: pointer;
            transition: 0.2s;
        }

        .choice:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

    <h1>THE DREAM FOREST</h1>

    <p>
        You fall asleep.
        <br><br>
        You wake up somewhere else.
        <br><br>
        The forest is silent.
        Something is watching you.
    </p>

    <a href="01.html">
        <button class="choice">Listen to the Animals</button>
    </a>

    <a href="02.html">
        <button class="choice">Follow the Girl</button>
    </a>

</body>
</html>
