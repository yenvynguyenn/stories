<!DOCTYPE html>
<html>
<head>
    <title>My Daily Routine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ffd6e0, #cce7ff);
            padding: 50px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 60%;
            margin: auto;
            box-shadow: 0 0 15px gray;
        }

        button {
            padding: 12px 25px;
            margin: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .morning { background-color: #ffcc70; }
        .night { background-color: #6c63ff; color: white; }
        .both { background-color: #00b894; color: white; }

        button:hover { opacity: 0.8; }
    </style>
</head>

<body>

<div class="box">
    <h1>My Interactive Daily Routine</h1>
    <p>Choose your path:</p>

    <a href="morning.html">
        <button class="morning">☀️ Morning Only</button>
    </a>

    <a href="night.html">
        <button class="night">🌙 Night Only</button>
    </a>

    <a href="fullday.html">
        <button class="both">🌅🌙 Full Day (Long Path)</button>
    </a>
</div>

</body>
</html>
