<!DOCTYPE html>
<html>
<head>
    <title>The Witch's Path</title>

    <style>
        body {
            background-color: #050505;
            color: #e6d6ff;
            font-family: "Courier New", monospace;
            text-align: center;
            padding: 100px;
        }

        h1 {
            font-size: 40px;
            text-shadow: 0 0 8px #b57aff;
        }

        p {
            font-size: 18px;
            max-width: 600px;
            margin: auto;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            background-color: #1a001a;
            color: #d8b6ff;
            text-decoration: none;
            border: 2px solid #b57aff;
            transition: 0.3s;
        }

        a:hover {
            background-color: #330033;
            box-shadow: 0 0 15px #b57aff;
        }

        /* Hidden Ending */
        .secret {
            opacity: 0;
            transition: opacity 0.8s ease, text-shadow 0.8s ease;
            margin-top: 60px;
            cursor: pointer;
        }

        .secret:hover {
            opacity: 1;
            text-shadow: 0 0 18px #d8b6ff;
        }
    </style>
</head>

<body>

    <h1>The Witch Smiles</h1>

    <p>
        You follow her deeper into the forest.
        The trees thin. The sky disappears.
        She hands you a map drawn in ink that never dries.
        The animals' voices fade away.
        The path behind you vanishes.
    </p>

    <h2 class="secret">YOU WILL NEVER WAKE UP.</h2>

    <a href="index.html">Return to the Beginning</a>

</body>
</html>
