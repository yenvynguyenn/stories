<!DOCTYPE html>
<html>
<head>
<title>Witch Path</title>

<style>
body {
    background-color: #080000;
    color: #ff4d4d;
    font-family: "Courier New", monospace;
    text-align: center;
    padding-top: 100px;
}

/* Typewriter */
.typewriter {
    width: 60%;
    margin: auto;
    margin-bottom: 30px;
    line-height: 1.6;
    border-right: 2px solid #ff4d4d;
    white-space: pre-wrap;
    overflow: hidden;
    animation: blink 1.2s infinite;
}

/* Blinking cursor */
@keyframes blink {
    0% { border-color: #ff4d4d; }
    50% { border-color: transparent; }
    100% { border-color: #ff4d4d; }
}

h1 {
    letter-spacing: 3px;
}

/* Button */
.choice {
    display: block;
    margin: 40px auto;
    width: 250px;
    padding: 12px;
    border: 2px solid #ff4d4d;
    background: #080000;
    color: #ff4d4d;
    font-family: "Courier New", monospace;
    cursor: pointer;
    transition: 0.2s;
}

.choice:hover {
    background: #ff4d4d;
    color: #080000;
}

/* Hidden ending */
.secret {
    opacity: 0;
    transition: opacity 1s ease, text-shadow 1s ease;
    margin-top: 40px;
}

.secret:hover {
    opacity: 1;
    text-shadow: 0 0 15px #ff1a1a;
}
</style>
</head>

<body>

<h1>DEEPER INTO THE FOREST</h1>

<p class="typewriter" id="story"></p>

<h2 class="secret">YOU ARE STILL ASLEEP.</h2>
<h2 class="secret">YOU WILL ALWAYS BE ASLEEP.</h2>

<a href="index.html">
    <button class="choice">Restart</button>
</a>

<script>
const text = `You follow her.
The forest grows quieter.
No wind.
No animals.

She hands you the map.
It feels warm.
Too warm.

In the reflection of a black pond,
her smile stretches too wide.

Somewhere far away,
your alarm clock rings.

You do not wake up.`;

let i = 0;
const speed = 90; // slow suspense typing
const story = document.getElementById("story");

function typeWriter() {
    if (i < text.length) {
        story.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
</script>

</body>
</html>
